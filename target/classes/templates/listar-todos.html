<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Biblioteca</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        table {
            width: 80%;
            margin: auto;
            border-collapse: collapse;
            background: white;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        th {
            background-color: #2c3e50;
            color: white;
            padding: 12px;
        }

        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        /* STATUS BASE */
        .status {
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            min-width: 120px;
            font-size: 13px;
            color: white; /* garante contraste */
        }

        /* DISPONÍVEL (verde forte e visível) */
        .disponivel {
            background-color: #28a745;
        }

        /* INDISPONÍVEL (vermelho forte e visível) */
        .indisponivel {
            background-color: #dc3545;
        }

    </style>

</head>

<body>

<h1>📚 Lista de Livros</h1>

<table>
    <tr>
        <th>Nome</th>
        <th>Autor</th>
        <th>Status</th>
    </tr>

    <tr th:each="livro : ${livros}">
        <td th:text="${livro.nomeLivro}"></td>
        <td th:text="${livro.autor}"></td>

        <!-- STATUS CORRIGIDO (SEM DEPENDER DE ENUM DIRETO) -->
        <td>
            <span th:text="${livro.status}"
                  th:class="${livro.status == 'DISPONIVEL'} ? 'status disponivel' : 'status indisponivel'">
            </span>
        </td>
    </tr>

</table>

</body>
</html>
